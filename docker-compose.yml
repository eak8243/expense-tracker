version: "3.9"

services:
  # ─── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: expense-tracker-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: expense_tracker
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"          # ลบบรรทัดนี้ถ้าไม่ต้องการเปิด port ออกนอก
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── App Server ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-tracker-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000

      # Database
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/expense_tracker

      # Auth / Session
      JWT_SECRET: ${JWT_SECRET}

      # Manus OAuth (ถ้าใช้ Manus login)
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}

      # Manus Built-in APIs (storage, LLM, notifications)
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Expense Tracker}
      VITE_APP_LOGO: ${VITE_APP_LOGO:-}
      VITE_APP_ID: ${VITE_APP_ID}

    ports:
      - "3000:3000"
    volumes:
      - app_uploads:/app/uploads   # สำหรับ local file uploads (ถ้ามี)

  # ─── Nginx Reverse Proxy (optional แต่แนะนำ) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: expense-tracker-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs   # สำหรับ SSL certificate

volumes:
  db_data:
  app_uploads:
  nginx_certs:
